name: Build and Push Backend Image

on:
  push:
    branches:
      - main # Asegúrate de que coincida con tu rama (main o master)

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar Código
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Compilar Jar con Maven
        run: mvn clean package -DskipTests

      - name: Iniciar Sesión en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }} # 👈 Corregido a punto (.)
          password: ${{ secrets.DOCKERHUB_TOKEN }}    # 👈 Corregido a punto (.)

      - name: Construir y Subir Imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/backend-pos:latest # 👈 Corregido a punto (.)